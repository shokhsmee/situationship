services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-situationship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-situationship}
      POSTGRES_DB: ${POSTGRES_DB:-situationship}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-situationship}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-situationship}:${POSTGRES_PASSWORD:-situationship}@postgres:5432/${POSTGRES_DB:-situationship}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  bot:
    build: ./bot
    # on-failure (not unless-stopped) so a token-less/disabled bot exits cleanly
    # instead of restart-looping.
    restart: on-failure
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000/api/v1
    depends_on:
      - api

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
